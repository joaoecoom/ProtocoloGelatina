name: Push Reminders Cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger push reminders endpoint
        env:
          PUSH_CRON_URL: ${{ secrets.PUSH_CRON_URL }}
          PUSH_CRON_SECRET: ${{ secrets.PUSH_CRON_SECRET }}
        run: |
          if [ -z "$PUSH_CRON_URL" ] || [ -z "$PUSH_CRON_SECRET" ]; then
            echo "Missing PUSH_CRON_URL or PUSH_CRON_SECRET GitHub secrets."
            exit 1
          fi
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $PUSH_CRON_SECRET" \
            "$PUSH_CRON_URL/api/cron/push-reminders"
