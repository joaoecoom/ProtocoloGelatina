<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1b4332" />
    <title>Sem ligação — Protocolo Gelatina Inteligente</title>
    <style>
      :root {
        --bg: #f1f7f3;
        --ink: #141816;
        --forest: #1b4332;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      .card {
        max-width: 22rem;
        text-align: center;
        padding: 2rem 1.5rem;
        border-radius: 1.25rem;
        background: #fff;
        box-shadow: 0 12px 40px rgba(27, 67, 50, 0.12);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--forest);
      }
      p {
        margin: 0;
        line-height: 1.5;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sem ligação à internet</h1>
      <p>Volta a tentar quando estiveres online.</p>
    </div>
  </body>
</html>
